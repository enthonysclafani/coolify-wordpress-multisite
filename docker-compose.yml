services:
  wordpress:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      WORDPRESS_DOMAIN: ${WORDPRESS_DOMAIN:?Set WORDPRESS_DOMAIN in Coolify}
      WORDPRESS_TITLE: ${WORDPRESS_TITLE:?Set WORDPRESS_TITLE in Coolify}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER:?Set WORDPRESS_ADMIN_USER in Coolify}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL:?Set WORDPRESS_ADMIN_EMAIL in Coolify}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD:?Set WORDPRESS_ADMIN_PASSWORD in Cool