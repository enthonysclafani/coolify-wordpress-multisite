x-suite-metadata:
  preset: minimal
  description: WordPress e MariaDB, senza Redis e senza runner cron separato.

x-wordpress-build: &wordpress-build
  context: ..
  dockerfile: Dockerfile
  target: ${WORDPRESS_IMAGE_TARGET:-final}
  args:
    OPENLITESPEED_IMAGE: ${OPENLITESPEED_IMAGE:-litespeedtech/openlitespeed:1.8.5-lsphp83}
    WP_CLI_VERSION: ${WP_CLI_VERSION:-2.12.0}
    WORDPRESS_VERSION: ${WORDPRESS_VERSION:-7.0.2}
    WORDPRESS_LOCALE: ${WORDPRESS_LOCALE:-it_IT}

services:
  wordpress:
    build: *wordpress-build
    environment:
      WORDPRESS_DOMAIN: ${WORDPRESS_DOMAIN:?Imposta WORDPRESS_DOMAIN in Coolify}
      WORDPRESS_TITLE: ${WORDPRESS_TITLE:?Imposta WORDPRESS_TITLE in Coolify}
      WORDPRESS_ADMIN_USER: ${WORDPRESS_ADMIN_USER:?Imposta WORDPRESS_ADMIN_USER in Coolify}
      WORDPRESS_ADMIN_EMAIL: ${WORDPRESS_ADMIN_EMAIL:?Imposta WORDPRESS_ADMIN_EMAIL in Coolify}
      WORDPRESS_ADMIN_PASSWORD: ${WORDPRESS_ADMIN_PASSWORD:?Imposta WORDPRESS_ADMIN_PASSWORD in Coolify}
      WORDPRESS_LOCALE: ${WORDPRESS_LOCALE:-it_IT}
      WORDPRESS_TIMEZONE: ${WORDPRESS_TIMEZONE:-Europe/Rome}
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG:-false}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX:-wp_}
      WORDPRESS_SKIP_EMAIL: ${WORDPRESS_SKIP_EMAIL:-true}
      WORDPRESS_ENABLE_MULTISITE: ${WORDPRESS_ENABLE_MULTISITE:-false}
      WORDPRESS_MULTISITE_MODE: ${WORDPRESS_MULTISITE_MODE:-subdirectory}
      WORDPRESS_FILESYSTEM_MODE: mutable
      WORDPRESS_BOOTSTRAP_PRESET: ${WORDPRESS_BOOTSTRAP_PRESET:-minimal}
      WORDPRESS_BOOTSTRAP_MANIFEST: ${WORDPRESS_BOOTSTRAP_MANIFEST:-}
      WORDPRESS_BOOTSTRAP_MANIFEST_JSON: ${WORDPRESS_BOOTSTRAP_MANIFEST_JSON:-}
      WORDPRESS_MANIFEST_REAPPLY: ${WORDPRESS_MANIFEST_REAPPLY:-false}
      WORDPRESS_INSTALL_PLUGINS: ${WORDPRESS_INSTALL_PLUGINS:-true}
      WORDPRESS_INSTALL_THEMES: ${WORDPRESS_INSTALL_THEMES:-true}
      WORDPRESS_ENABLE_REDIS: "false"
      WORDPRESS_DISABLE_WP_CRON: "false"
      WORDPRESS_MEMORY_LIMIT: ${WORDPRESS_MEMORY_LIMIT:-192M}
      WORDPRESS_MAX_MEMORY_LIMIT: ${WORDPRESS_MAX_MEMORY_LIMIT:-384M}
      WORDPRESS_VERSION: ${WORDPRESS_VERSION:-7.0.2}
      REDIS_CACHE_VERSION: ${REDIS_CACHE_VERSION:-2.8.0}
      ELASTICPRESS_VERSION: ${ELASTICPRESS_VERSION:-5.3.3}
      WORDPRESS_RUNTIME_PROFILE: ${WORDPRESS_RUNTIME_PROFILE:-small}
      WORDPRESS_HEALTHCHECK_MODE: readiness
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-256M}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-256M}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-384M}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-300}
      PHP_MAX_INPUT_TIME: ${PHP_MAX_INPUT_TIME:-300}
      PHP_MAX_INPUT_VARS: ${PHP_MAX_INPUT_VARS:-5000}
      PHP_LSAPI_CHILDREN: ${PHP_LSAPI_CHILDREN:-}
      LSAPI_AVOID_FORK: ${LSAPI_AVOID_FORK:-}
      PHP_OPCACHE_MEMORY_CONSUMPTION: ${PHP_OPCACHE_MEMORY_CONSUMPTION:-}
      PHP_OPCACHE_INTERNED_STRINGS_BUFFER: ${PHP_OPCACHE_INTERNED_STRINGS_BUFFER:-}
      PHP_OPCACHE_MAX_ACCELERATED_FILES: ${PHP_OPCACHE_MAX_ACCELERATED_FILES:-}
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: ${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-1}
      PHP_OPCACHE_REVALIDATE_FREQ: ${PHP_OPCACHE_REVALIDATE_FREQ:-2}
      OLS_MAX_CONNECTIONS: ${OLS_MAX_CONNECTIONS:-}
      OLS_KEEP_ALIVE_TIMEOUT: ${OLS_KEEP_ALIVE_TIMEOUT:-5}
      OLS_MAX_REQUEST_BODY_SIZE: ${OLS_MAX_REQUEST_BODY_SIZE:-2047M}
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${SERVICE_PASSWORD_WORDPRESS:?Imposta SERVICE_PASSWORD_WORDPRESS in Coolify}
      WORDPRESS_DB_SSL: "false"
      WORDPRESS_REDIS_HOST: disabled.invalid
      WORDPRESS_SMTP_MODE: ${WORDPRESS_SMTP_MODE:-disabled}
      WORDPRESS_SMTP_HOST: ${WORDPRESS_SMTP_HOST:-}
      WORDPRESS_SMTP_PORT: ${WORDPRESS_SMTP_PORT:-587}
      WORDPRESS_SMTP_ENCRYPTION: ${WORDPRESS_SMTP_ENCRYPTION:-tls}
      WORDPRESS_SMTP_AUTH: ${WORDPRESS_SMTP_AUTH:-true}
      WORDPRESS_SMTP_USERNAME: ${WORDPRESS_SMTP_USERNAME:-}
      WORDPRESS_SMTP_PASSWORD: ${WORDPRESS_SMTP_PASSWORD:-}
      WORDPRESS_SMTP_FROM_EMAIL: ${WORDPRESS_SMTP_FROM_EMAIL:-}
      WORDPRESS_SMTP_FROM_NAME: ${WORDPRESS_SMTP_FROM_NAME:-}
      WORDPRESS_SMTP_VERIFY_TLS: ${WORDPRESS_SMTP_VERIFY_TLS:-true}
      WORDPRESS_SMTP_TIMEOUT_SECONDS: ${WORDPRESS_SMTP_TIMEOUT_SECONDS:-15}
      WORDPRESS_MEDIA_STORAGE: ${WORDPRESS_MEDIA_STORAGE:-local}
      WORDPRESS_S3_BUCKET: ${WORDPRESS_S3_BUCKET:-}
      WORDPRESS_S3_REGION: ${WORDPRESS_S3_REGION:-}
      WORDPRESS_S3_ACCESS_KEY: ${WORDPRESS_S3_ACCESS_KEY:-}
      WORDPRESS_S3_SECRET_KEY: ${WORDPRESS_S3_SECRET_KEY:-}
      WORDPRESS_S3_SESSION_TOKEN: ${WORDPRESS_S3_SESSION_TOKEN:-}
      WORDPRESS_S3_ENDPOINT: ${WORDPRESS_S3_ENDPOINT:-}
      WORDPRESS_S3_BUCKET_URL: ${WORDPRESS_S3_BUCKET_URL:-}
      WORDPRESS_S3_PATH_STYLE: ${WORDPRESS_S3_PATH_STYLE:-true}
      WORDPRESS_S3_USE_INSTANCE_PROFILE: ${WORDPRESS_S3_USE_INSTANCE_PROFILE:-false}
      WORDPRESS_S3_AUTOENABLE: ${WORDPRESS_S3_AUTOENABLE:-true}
      WORDPRESS_S3_USE_LOCAL: ${WORDPRESS_S3_USE_LOCAL:-false}
      WORDPRESS_S3_OBJECT_ACL: ${WORDPRESS_S3_OBJECT_ACL:-private}
      WORDPRESS_S3_CACHE_CONTROL_SECONDS: ${WORDPRESS_S3_CACHE_CONTROL_SECONDS:-31536000}
      WORDPRESS_S3_CHECKSUM_WHEN_REQUIRED: ${WORDPRESS_S3_CHECKSUM_WHEN_REQUIRED:-true}
      WORDPRESS_SEARCH_MODE: ${WORDPRESS_SEARCH_MODE:-disabled}
      WORDPRESS_SEARCH_HOST: ${WORDPRESS_SEARCH_HOST:-}
      WORDPRESS_SEARCH_CREDENTIALS: ${WORDPRESS_SEARCH_CREDENTIALS:-}
      WORDPRESS_SEARCH_INDEX_PREFIX: ${WORDPRESS_SEARCH_INDEX_PREFIX:-coolifywp}
      WORDPRESS_SEARCH_MULTISITE_ACTIVATION: ${WORDPRESS_SEARCH_MULTISITE_ACTIVATION:-per-site}
      WORDPRESS_SEARCH_VERIFY: ${WORDPRESS_SEARCH_VERIFY:-false}
      WORDPRESS_ACTION_SCHEDULER_CONCURRENT_BATCHES: ${WORDPRESS_ACTION_SCHEDULER_CONCURRENT_BATCHES:-1}
    expose:
      - "7080"
    volumes:
      - wordpress_data:/var/www/vhosts/localhost/html
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/wordpress-healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 5m
    init: true
    restart: unless-stopped
    stop_grace_period: 30s

  mariadb:
    image: mariadb:11.8.8
    environment:
      MARIADB_ROOT_PASSWORD: ${SERVICE_PASSWORD_MARIADB:?Imposta SERVICE_PASSWORD_MARIADB in Coolify}
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-wordpress}
      MARIADB_USER: ${WORDPRESS_DB_USER:-wordpress}
      MARIADB_PASSWORD: ${SERVICE_PASSWORD_WORDPRESS:?Imposta SERVICE_PASSWORD_WORDPRESS in Coolify}
      MARIADB_AUTO_UPGRADE: "1"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=${MARIADB_MAX_CONNECTIONS:-100}
      - --innodb-buffer-pool-size=${MARIADB_INNODB_BUFFER_POOL_SIZE:-128M}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  wordpress_data:
  mariadb_data:
