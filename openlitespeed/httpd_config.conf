# OpenLiteSpeed 1.8.5 - configurazione minima per WordPress dietro Coolify.
serverName                      wordpress
user                            nobody
group                           nogroup
priority                        0
autoRestart                     1
chrootPath                      /
enableChroot                    0
inMemBufSize                    60M
swappingDir                     /tmp/lshttpd/swap
autoFix503                      1
gracefulRestartTimeout          300
mime                            conf/mime.properties
showVersionNumber               0
adminEmails                     root@localhost
indexFiles                      index.php, index.html
disableWebAdmin                 1

errorlog logs/error.log {
    logLevel                    WARN
    debugLevel                  0
    rollingSize                 10M
    enableStderrLog             1
}

accessLog logs/access.log {
    rollingSize                 10M
    keepDays                    3
    compressArchive             0
    logReferer                  1
    logUserAgent                1
}

expires {
    enableExpires               1
    expiresByType               image/*=A604800,text/css=A604800,application/javascript=A604800,font/*=A604800
}

tuning {
    maxConnections              @OLS_MAX_CONNECTIONS@
    maxSSLConnections           @OLS_MAX_CONNECTIONS@
    connTimeout                 300
    maxKeepAliveReq             10000
    keepAliveTimeout            @OLS_KEEP_ALIVE_TIMEOUT@
    sndBufSize                  0
    rcvBufSize                  0
    eventDispatcher             best
    maxCachedFileSize           4096
    totalInMemCacheSize         20M
    maxMMapFileSize             256K
    totalMMapCacheSize          40M
    useSendfile                 1
    fileETag                    28
    maxReqURLLen                32768
    maxReqHeaderSize            65536
    maxReqBodySize              @OLS_MAX_REQUEST_BODY_SIZE@
    maxDynRespHeaderSize        32768
    maxDynRespSize              2047M
    enableGzipCompress          1
    enableBrCompress            4
    enableDynGzipCompress       1
    gzipCompressLevel           6
    brStaticCompressLevel       6
    compressibleTypes           default
    gzipAutoUpdateStatic        1
    gzipMinFileSize             300
    quicEnable                  0
}

accessDenyDir {
    dir                         /
    dir                         /etc/*
    dir                         /dev/*
    dir                         conf/*
    dir                         admin/conf/*
}

fileAccessControl {
    followSymbolLink            1
    checkSymbolLink             0
    requiredPermissionMask      000
    restrictedPermissionMask    000
}

accessControl {
    allow                       ALL
    deny
}

extProcessor lsphp {
    type                        lsapi
    address                     127.0.0.1:9000
    maxConns                    @LSAPI_CHILDREN@
    env                         PHP_LSAPI_CHILDREN=@LSAPI_CHILDREN@
    env                         LSAPI_AVOID_FORK=@LSAPI_AVOID_FORK@
    initTimeout                 60
    retryTimeout                0
    persistConn                 1
    respBuffer                  0
    autoStart                   0
    path                        fcgi-bin/lsphp
    backlog                     100
    instances                   1
    priority                    0
    memSoftLimit                0
    memHardLimit                0
    procSoftLimit               1400
    procHardLimit               1500
}

scriptHandler {
    add                         lsapi:lsphp php
}

virtualHost wordpress {
    vhRoot                      /var/www/vhosts/localhost/
    allowSymbolLink             1
    enableScript                1
    restrained                  1
    setUIDMode                  0
    configFile                  conf/vhosts/wordpress/vhconf.conf
}

listener HTTP {
    address                     *:7080
    secure                      0
    map                         wordpress *
}

module cache {
    ls_enabled                  1
    checkPrivateCache           1
    checkPublicCache            1
    maxCacheObjSize             10000000
    maxStaleAge                 200
    qsCache                     1
    reqCookieCache              1
    respCookieCache             1
    ignoreReqCacheCtrl          1
    ignoreRespCacheCtrl         0
    enableCache                 0
    expireInSeconds             3600
    enablePrivateCache          0
    privateExpireInSeconds      3600
}
